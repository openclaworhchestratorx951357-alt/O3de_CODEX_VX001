services:
  backend:
    build:
      context: ./backend
    container_name: o3de-codex-backend
    environment:
      O3DE_CONTROL_PLANE_DB_PATH: /app/runtime/control_plane.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./runtime:/app/runtime

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: o3de-codex-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
